<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CGA Admin - Hassas GPS & QR Panel</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
<style>
    body { margin:0; font-family:'Montserrat',sans-serif; background:#1a252f; color:#ecf0f1; }
    .container { max-width:800px; margin:80px auto 20px; padding:20px; background: rgba(0,0,0,0.4); border-radius:16px; border: 1px solid rgba(255,255,255,0.1); box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
    h1 { text-align:center; margin-bottom:30px; font-weight:700; letter-spacing: 1px; color: #3498db; }
    label { display:block; margin-top:20px; font-weight:600; color: #bdc3c7; font-size: 14px; }
    input, select, button { width:100%; padding:12px; margin:8px 0; border-radius:10px; border:none; font-size:16px; box-sizing: border-box; }
    input, select { background: #2c3e50; color: white; border: 1px solid #34495e; }
    button { cursor:pointer; font-weight:700; transition:all 0.3s ease; text-transform: uppercase; }
    button:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(0,0,0,0.3); }
    
    #qrList div { margin:15px 0; padding:15px; background: rgba(52, 73, 94, 0.4); border-radius:12px; display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap: 10px; border: 1px solid rgba(255,255,255,0.05); }
    .qrCodeImg { width:140px; height:140px; border-radius:10px; display:flex; align-items:center; justify-content:center; background:#fff; padding:10px; }
    
    #logoutBtn { position: fixed; top: 20px; left: 20px; width: 60px; height: 60px; background: #e74c3c; color: #fff; border-radius:15px; border:none; cursor:pointer; z-index:1000; box-shadow: 0 4px 10px rgba(231,76,60,0.3); }
    #qrLabel { position: fixed; top: 25px; right: 25px; color: #3498db; font-weight:700; font-size:16px; z-index:1000; letter-spacing: 2px; }

    .gps-info { font-size: 12px; color: #95a5a6; margin-top: 8px; line-height: 1.6; }
    .gps-active { color: #2ecc71; font-weight: bold; background: rgba(46, 204, 113, 0.1); padding: 2px 6px; border-radius: 4px; }
    .gps-inactive { color: #e74c3c; font-weight: bold; background: rgba(231, 76, 60, 0.1); padding: 2px 6px; border-radius: 4px; }

    /* Action Buttons */
    .btn-group { display: flex; flex-direction: column; gap: 5px; width: 120px; }
    .btn-action { font-size: 11px; padding: 8px; margin: 0; }
</style>
</head>
<body>

<button id="logoutBtn">Çıkış</button>
<div id="qrLabel">CGA SECURITY</div>

<div class="container">
    <h1>KOLART GÜVENLİK PANEL</h1>

    <label>Blok/Site Seçimi:</label>
    <select id="blockDropdown">
        <option value="">Seçiniz</option>
    </select>

    <label>Yeni Blok/Saha Adı (Opsiyonel):</label>
    <input type="text" id="blockInput" placeholder="Örn: Melisa Sitesi">

    <label>Devriye Noktası Tanımı:</label>
    <input type="text" id="pointName" placeholder="Örn: Garaj Girişi">
    
    <label style="display:flex; align-items:center; gap:10px; cursor:pointer; background:rgba(255,255,255,0.05); padding:10px; border-radius:8px; margin-top:15px;">
        <input type="checkbox" id="gpsRequiredCheckbox" style="width:auto; margin:0;"> 
        <span>GPS Kontrolü Zorunlu (Hassas Takip)</span>
    </label>

    <button id="generateQRBtn" style="background:#2ecc71; color:#fff; margin-top:20px;">QR Kod Oluştur & Sisteme İşle</button>
    
    <h2 style="margin-top:40px; border-bottom:1px solid #34495e; padding-bottom:10px;">Kayıtlı Noktalar</h2>
    <div id="qrList"></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.1.0/firebase-app.js";
import { getDatabase, ref, set, remove, serverTimestamp, get, push, update } from "https://www.gstatic.com/firebasejs/12.1.0/firebase-database.js";

// DOM Elemanları
const blockDropdown = document.getElementById('blockDropdown');
const blockInput = document.getElementById('blockInput');
const pointName = document.getElementById('pointName');
const gpsRequiredCheckbox = document.getElementById('gpsRequiredCheckbox');
const generateQRBtn = document.getElementById('generateQRBtn');
const qrList = document.getElementById('qrList');
const logoutBtn = document.getElementById('logoutBtn');

logoutBtn.addEventListener('click', ()=> { window.location.href = 'mod.html'; });

// QR Kütüphanesi Yükleme
const QR_SCRIPT = document.createElement('script');
QR_SCRIPT.src = "https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js";
document.body.appendChild(QR_SCRIPT);
await new Promise(resolve => QR_SCRIPT.onload = resolve);

// Firebase Konfigürasyonları
const merkezConfig = {
    apiKey: "AIzaSyAM5NHBpRHIlttNXwJ9YKDypR4eoyQbDeM",
    authDomain: "kolartguvenlik-e002d.firebaseapp.com",
    databaseURL: "https://kolartguvenlik-e002d-default-rtdb.firebaseio.com",
    projectId: "kolartguvenlik-e002d",
    storageBucket: "kolartguvenlik-e002d.firebasestorage.app",
    messagingSenderId: "212955174898",
    appId: "1:212955174898:web:f77501991c1648fb66bd6b"
};
const merkezApp = initializeApp(merkezConfig, "merkez");
const merkezDb = getDatabase(merkezApp);

const selectedSiteId = sessionStorage.getItem("selectedSite");
if(!selectedSiteId){
    alert("Site seçilmedi!");
    window.location.href = "index.html";
}

const siteConfigSnap = await get(ref(merkezDb, "sites/" + selectedSiteId + "/config"));
const siteConfig = siteConfigSnap.val();
const siteApp = initializeApp(siteConfig, selectedSiteId);
const db = getDatabase(siteApp);

// Yardımcı Fonksiyonlar
function createSafeQRId(name){
    return btoa(unescape(encodeURIComponent(name))) + '_' + Date.now();
}

function calculateAverageGPS(coordsArray) {
    if (coordsArray.length === 0) return null;
    const sum = coordsArray.reduce((acc, curr) => {
        acc.lat += curr.lat;
        acc.lon += curr.lon;
        return acc;
    }, { lat: 0, lon: 0 });
    return { lat: sum.lat / coordsArray.length, lon: sum.lon / coordsArray.length };
}

// Blokları Yükle
async function loadBlocks() {
    blockDropdown.innerHTML = '<option value="">Seçiniz</option>';
    const snapshot = await get(ref(db,'qrCodes/')); // Ana qrCodes altındaki blokları da tara
    // Bu kısım senin veri yapına göre dinamikleşebilir
}
loadBlocks();

// QR Oluşturma
generateQRBtn.addEventListener('click', async () => {
    generateQRBtn.disabled = true;
    const name = pointName.value.trim();
    let block = blockInput.value.trim() || blockDropdown.value.trim();
    
    if(!name){ alert("Nokta adı boş olamaz!"); generateQRBtn.disabled=false; return; }

    const qrData = { 
        name, 
        qrId: createSafeQRId(name), 
        firma: block ? "CGA " + block : "CGA", 
        block: block || '', 
        timestamp: serverTimestamp(),
        gpsRequired: gpsRequiredCheckbox.checked,
        lat: null, 
        lon: null 
    };

    const path = block ? block + "qrcodes/" : "qrCodes/";
    await push(ref(db, path), qrData);
    
    pointName.value=''; 
    loadQRCodes(block);
    generateQRBtn.disabled=false;
});

// QR Listeleme
async function loadQRCodes(selectedBlock=''){
    qrList.innerHTML='<p style="text-align:center;">Veriler çekiliyor...</p>';
    const path = selectedBlock ? selectedBlock + "qrcodes/" : "qrCodes/";
    const snapshot = await get(ref(db, path));
    const data = snapshot.val();
    
    qrList.innerHTML='';
    if(data){
        Object.values(data).sort((a,b)=>b.timestamp-a.timestamp).forEach(qr => addQRToList(qr));
    } else {
        qrList.innerHTML='<p style="text-align:center; color:#7f8c8d;">Henüz kayıtlı nokta yok.</p>';
    }
}

function addQRToList(qrData){
    const div = document.createElement('div');
    const qrDiv = document.createElement('div'); qrDiv.classList.add('qrCodeImg');
    new QRCode(qrDiv, { text: qrData.qrId, width:130, height:130 });

    const infoDiv = document.createElement('div');
    infoDiv.style.flex = "1";
    infoDiv.style.marginLeft = "15px";
    
    const gpsStatus = qrData.gpsRequired ? '<span class="gps-active">GPS ZORUNLU</span>' : '<span class="gps-inactive">GPS OPSİYONEL</span>';
    const coords = qrData.lat ? `${qrData.lat.toFixed(6)}, ${qrData.lon.toFixed(6)}` : 'Atanmamış';

    infoDiv.innerHTML=`<strong style="font-size:18px; color:#3498db;">${qrData.name}</strong>
    <div class="gps-info">
        <b>ID:</b> ${qrData.qrId.substring(0,10)}...<br>
        <b>Durum:</b> ${gpsStatus}<br>
        <b>Kordinat:</b> <span style="color:#f1c40f">${coords}</span>
    </div>`;

    const btnGroup = document.createElement('div');
    btnGroup.classList.add('btn-group');

    const coordBtn = document.createElement('button');
    coordBtn.textContent='KOORDİNAT ATA';
    coordBtn.classList.add('btn-action');
    coordBtn.style.background='#3498db'; coordBtn.style.color='#fff';
    coordBtn.onclick = () => assignCoordinates(qrData);

    const downloadBtn = document.createElement('button');
    downloadBtn.textContent='PNG İNDİR';
    downloadBtn.classList.add('btn-action');
    downloadBtn.style.background='#27ae60'; downloadBtn.style.color='#fff';
    downloadBtn.onclick = () => {
        const canvas = qrDiv.querySelector('canvas');
        const link = document.createElement('a');
        link.download = `${qrData.name}_QR.png`;
        link.href = canvas.toDataURL();
        link.click();
    };

    const deleteBtn = document.createElement('button');
    deleteBtn.textContent='SİL';
    deleteBtn.classList.add('btn-action');
    deleteBtn.style.background='#c0392b'; deleteBtn.style.color='#fff';
    deleteBtn.onclick = async () => {
        if(confirm("Silinsin mi?")){
            let path = (qrData.block ? qrData.block + "qrcodes" : "qrCodes");
            const snap = await get(ref(db, path));
            const objs = snap.val();
            const key = Object.keys(objs).find(k => objs[k].qrId === qrData.qrId);
            await remove(ref(db, path + "/" + key));
            loadQRCodes(blockDropdown.value);
        }
    };

    btnGroup.append(coordBtn, downloadBtn, deleteBtn);
    div.append(qrDiv, infoDiv, btnGroup);
    qrList.appendChild(div);
}

// 🔹 HASSAS KOORDİNAT ATA MODÜLÜ (10 ÖRNEKLİ & AKILLI TAKİP)
async function assignCoordinates(qrData) {
    if (!navigator.geolocation) return alert("GPS Desteklenmiyor!");

    const overlay = document.createElement('div');
    overlay.style.cssText = `position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.95);color:white;z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;`;
    overlay.innerHTML = `
        <div style="border:2px solid #3498db; padding:40px; border-radius:20px; background:#1a252f; width:85%; max-width:400px;">
            <h2 style="color:#3498db; margin-bottom:5px;">HASSAS KONUM KAYDI</h2>
            <p id="statusMsg" style="font-size:14px; color:#bdc3c7;">Sinyal aranıyor...</p>
            <div id="progressText" style="font-size:60px; font-weight:700; color:#2ecc71; margin:20px 0;">0 / 10</div>
            <div style="width:100%; height:12px; background:#34495e; border-radius:6px; overflow:hidden; margin-bottom:25px;">
                <div id="progressBar" style="width:0%; height:100%; background:#2ecc71; transition:0.4s;"></div>
            </div>
            <div style="display:flex; gap:10px;">
                <button id="saveBtn" disabled style="background:#27ae60; color:white; opacity:0.3; flex:1;">KAYDET</button>
                <button id="cancelBtn" style="background:#e74c3c; color:white; flex:1;">İPTAL</button>
            </div>
            <p id="errorNote" style="color:#f1c40f; font-size:11px; margin-top:20px; display:none; animation:blink 1s infinite;">⚠️ SİNYAL ZAYIF! LÜTFEN SABİT KALIN...</p>
        </div>
        <style>@keyframes blink { 50% {opacity:0.3;} }</style>
    `;
    document.body.appendChild(overlay);

    let collectedCoords = [];
    const maxSamples = 10;
    const saveBtn = document.getElementById('saveBtn');
    const cancelBtn = document.getElementById('cancelBtn');
    const statusMsg = document.getElementById('statusMsg');
    const errorNote = document.getElementById('errorNote');

    const collectInterval = setInterval(() => {
        if (collectedCoords.length >= maxSamples) return;

        navigator.geolocation.getCurrentPosition((pos) => {
            collectedCoords.push({ lat: pos.coords.latitude, lon: pos.coords.longitude });
            errorNote.style.display = 'none';
            statusMsg.innerText = "Veri toplanıyor, kımıldamayın...";
            
            const count = collectedCoords.length;
            document.getElementById('progressText').innerText = `${count} / ${maxSamples}`;
            document.getElementById('progressBar').style.width = `${(count / maxSamples) * 100}%`;

            if (count >= maxSamples) {
                statusMsg.innerText = "Ölçüm tamam! Onay bekleniyor.";
                saveBtn.disabled = false; saveBtn.style.opacity = "1";
            }
        }, (err) => {
            errorNote.style.display = 'block';
            statusMsg.innerText = "Sinyal kesildi! Bekleniyor...";
        }, { enableHighAccuracy: true, timeout: 10000, maximumAge: 0 });
    }, 1800);

    saveBtn.onclick = async () => {
        const avg = calculateAverageGPS(collectedCoords);
        clearInterval(collectInterval);
        document.body.removeChild(overlay);

        let path = qrData.block ? qrData.block + "qrcodes" : "qrCodes";
        const snap = await get(ref(db, path));
        const key = Object.keys(snap.val()).find(k => snap.val()[k].qrId === qrData.qrId);
        
        await update(ref(db, path + "/" + key), { lat: avg.lat, lon: avg.lon });
        alert("Referans koordinatı 10 örnek üzerinden başarıyla mühürlendi!");
        loadQRCodes(blockDropdown.value);
    };

    cancelBtn.onclick = () => { clearInterval(collectInterval); document.body.removeChild(overlay); };
}

loadQRCodes();
</script>
</body>
</html>
