<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Panel - Devriye Noktaları & QR Kodlar</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600&display=swap" rel="stylesheet">
<style>
body { margin:0; font-family:'Montserrat',sans-serif; background:#2c3e50; color:#ecf0f1; }
.container { max-width:800px; margin:80px auto 20px; padding:20px; background: rgba(0,0,0,0.3); border-radius:12px; }
h1 { text-align:center; margin-bottom:20px; }
label { display:block; margin-top:15px; font-weight:600; }
input, select, button { width:100%; padding:10px; margin:5px 0; border-radius:8px; border:none; font-size:16px; }
button { cursor:pointer; font-weight:600; transition:0.3s; }
button:hover { opacity:0.9; }
#qrList div { margin:10px 0; padding:10px; background: rgba(255,255,255,0.1); border-radius:8px; display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; position: relative; }
.qrCodeImg { width:150px; height:150px; border:1px solid #fff; border-radius:8px; display:flex; align-items:center; justify-content:center; background:#fff; padding:10px; }
#logoutBtn { position: fixed; top: 20px; left: 20px; width: 60px; height: 60px; background: #e74c3c; color: #fff; font-weight:700; border-radius:12px; border:none; cursor:pointer; z-index:1000; font-size:16px; }
#qrLabel { position: fixed; top: 20px; right: 20px; color: #ecf0f1; font-weight:600; font-size:14px; opacity:0.7; z-index:1000; }

.gps-info { font-size: 12px; color: #bdc3c7; margin-top: 5px; }
.gps-active { color: #2ecc71; font-weight: bold; }
.gps-inactive { color: #e74c3c; font-weight: bold; }

/* Yeni Eklenen Progress CSS */
#gpsProgressOverlay { position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); color:white; z-index:9999; display:none; flex-direction:column; align-items:center; justify-content:center; text-align:center; }
</style>
</head>
<body>

<button id="logoutBtn">Çıkış</button>
<div id="qrLabel">qrcodes</div>

<div id="gpsProgressOverlay">
    <div style="border:2px solid #3498db; padding:30px; border-radius:15px; background:#1a252f;">
        <h2 style="color:#3498db; margin:0;">HASSAS REFERANS KAYDI</h2>
        <p id="gpsStatusMsg">Sinyal aranıyor...</p>
        <div id="gpsProgressText" style="font-size:50px; font-weight:bold; color:#2ecc71; margin:15px 0;">0 / 10</div>
        <div style="width:200px; height:10px; background:#444; border-radius:5px; margin:0 auto; overflow:hidden;">
            <div id="gpsProgressBar" style="width:0%; height:100%; background:#2ecc71; transition:0.3s;"></div>
        </div>
        <div style="margin-top:20px; display:flex; gap:10px; justify-content:center;">
            <button id="gpsSaveBtn" disabled style="background:#27ae60; color:white; padding:10px; width:120px; opacity:0.5;">KAYDET</button>
            <button id="gpsCancelBtn" style="background:#c0392b; color:white; padding:10px; width:120px;">İPTAL</button>
        </div>
    </div>
</div>

<div class="container">
  <h1>Admin Panel - Devriye Noktaları & GPS</h1>
  <label>Blok Seç (dropdown):</label>
  <select id="blockDropdown"><option value="">Seçiniz</option></select>
  <label>Veya Özel Blok/Site Adı Yaz (opsiyonel):</label>
  <input type="text" id="blockInput" placeholder="Örn: Meslisa">
  <label>Devriye Noktası Adı:</label>
  <input type="text" id="pointName" placeholder="Örn: Arka Bahçe">
  <label style="display:flex; align-items:center; gap:10px;">
    <input type="checkbox" id="gpsRequiredCheckbox" style="width:auto;"> GPS Kontrolü Zorunlu Olsun mu?
  </label>
  <button id="generateQRBtn" style="background:#27ae60; color:#fff;">QR Kod Oluştur & Kaydet</button>
  <h2>Oluşturulan QR Kodlar</h2>
  <div id="qrList"></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.1.0/firebase-app.js";
import { getDatabase, ref, set, remove, serverTimestamp, get, push, update } from "https://www.gstatic.com/firebasejs/12.1.0/firebase-database.js";

const blockDropdown = document.getElementById('blockDropdown');
const blockInput = document.getElementById('blockInput');
const pointName = document.getElementById('pointName');
const gpsRequiredCheckbox = document.getElementById('gpsRequiredCheckbox');
const generateQRBtn = document.getElementById('generateQRBtn');
const qrList = document.getElementById('qrList');
const logoutBtn = document.getElementById('logoutBtn');

logoutBtn.addEventListener('click', ()=> { window.location.href = 'mod.html'; });

const QR_SCRIPT = document.createElement('script');
QR_SCRIPT.src = "https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js";
document.body.appendChild(QR_SCRIPT);
await new Promise(resolve => QR_SCRIPT.onload = resolve);

const merkezConfig = {
   apiKey: "AIzaSyAM5NHBpRHIlttNXwJ9YKDypR4eoyQbDeM",
  authDomain: "kolartguvenlik-e002d.firebaseapp.com",
  databaseURL: "https://kolartguvenlik-e002d-default-rtdb.firebaseio.com",
  projectId: "kolartguvenlik-e002d",
  storageBucket: "kolartguvenlik-e002d.firebasestorage.app",
  messagingSenderId: "212955174898",
  appId: "1:212955174898:web:f77501991c1648fb66bd6b",
  measurementId: "G-TCGDNDYY6Y"
};
const merkezApp = initializeApp(merkezConfig, "merkez");
const merkezDb = getDatabase(merkezApp);

const selectedSiteId = sessionStorage.getItem("selectedSite");
if(!selectedSiteId){
  alert("Lütfen ana panelden bir site seçin!");
  window.location.href = "index.html";
}

const siteConfigSnap = await get(ref(merkezDb, "sites/" + selectedSiteId + "/config"));
const siteConfig = siteConfigSnap.val();
const siteApp = initializeApp(siteConfig, selectedSiteId);
const db = getDatabase(siteApp);

// --- MATEMATİK FONKSİYONU ---
function calculateAvg(list) {
    const sum = list.reduce((a, b) => ({ lat: a.lat + b.lat, lon: a.lon + b.lon }), { lat: 0, lon: 0 });
    return { lat: sum.lat / list.length, lon: sum.lon / list.length };
}

function createSafeQRId(name){
  return btoa(unescape(encodeURIComponent(name))) + '_' + Date.now();
}

async function loadBlocksFromQRNoktas() {
  blockDropdown.innerHTML = '<option value="">Seçiniz</option>';
  const snapshot = await get(ref(db,'qrNoktas/'));
  const data = snapshot.val();
  if(!data) return;
  Object.values(data).forEach(qr => {
    if(qr.name && !Array.from(blockDropdown.options).some(opt => opt.value === qr.name)){
        const opt = document.createElement('option');
        opt.value = qr.name; opt.textContent = qr.name + " Blok/Site";
        blockDropdown.appendChild(opt);
    }
  });
}
loadBlocksFromQRNoktas();

generateQRBtn.addEventListener('click', async () => {
  generateQRBtn.disabled = true;
  const name = pointName.value.trim();
  let block = blockInput.value.trim() || blockDropdown.value.trim();
  if(!name){ alert("Nokta adı girin!"); generateQRBtn.disabled=false; return; }
  const qrId = createSafeQRId(name);
  const qrData = { name, qrId, firma: block ? "CGA " + block + " Devriye" : "CGA", block: block || '', timestamp: serverTimestamp(), gpsRequired: gpsRequiredCheckbox.checked, lat: null, lon: null };
  const path = block ? block + "qrcodes/" : "qrCodes/";
  await push(ref(db, path), qrData);
  pointName.value=''; blockInput.value=''; gpsRequiredCheckbox.checked = false;
  loadQRCodes(block);
  generateQRBtn.disabled=false;
});

async function loadQRCodes(selectedBlock=''){
  qrList.innerHTML='Loading...';
  let path = selectedBlock ? selectedBlock + "qrcodes/" : "qrCodes/";
  const snapshot = await get(ref(db, path));
  const data = snapshot.val();
  qrList.innerHTML='';
  if(data) Object.values(data).sort((a, b) => a.timestamp - b.timestamp).forEach(qr => addQRToList(qr));
}

blockDropdown.addEventListener('change', ()=> loadQRCodes(blockDropdown.value));

function addQRToList(qrData){
  const div = document.createElement('div');
  const qrDiv = document.createElement('div'); qrDiv.classList.add('qrCodeImg');
  new QRCode(qrDiv, { text: qrData.qrId, width:150, height:150, correctLevel:QRCode.CorrectLevel.H });

  const infoDiv = document.createElement('div'); infoDiv.style.marginLeft='10px';
  const gpsStatus = qrData.gpsRequired ? '<span class="gps-active">GPS AKTİF</span>' : '<span class="gps-inactive">GPS PASİF</span>';
  const coords = qrData.lat ? `(${qrData.lat.toFixed(4)}, ${qrData.lon.toFixed(4)})` : '(Koordinat Yok)';
  infoDiv.innerHTML=`<strong>${qrData.name}</strong><br>ID: ${qrData.qrId}<br><div class="gps-info">Durum: ${gpsStatus}<br>Koordinat: ${coords}</div>`;

  const coordBtn = document.createElement('button');
  coordBtn.textContent='Koordinat Ata'; coordBtn.style.background='#3498db'; coordBtn.style.color='#fff'; coordBtn.style.fontSize='12px'; coordBtn.style.padding='5px';
  coordBtn.addEventListener('click', () => assignCoordinates(qrData));

  // (Diğer Sil/İndir butonları buraya gelecek - kodun orijinal haliyle aynı kalacak)
  // ... (Kodun geri kalan sil ve indir butonları orijinalindeki gibi eklenebilir)
  div.append(qrDiv, infoDiv, coordBtn);
  qrList.appendChild(div);
}

// 🔹 FULL+FULL HASSAS KOORDİNAT ATA (ORİJİNAL YAPIYI BOZMADAN)
async function assignCoordinates(qrData) {
  if (!navigator.geolocation) return alert("GPS Yok!");
  
  const overlay = document.getElementById('gpsProgressOverlay');
  const statusMsg = document.getElementById('gpsStatusMsg');
  const progressText = document.getElementById('gpsProgressText');
  const progressBar = document.getElementById('gpsProgressBar');
  const saveBtn = document.getElementById('gpsSaveBtn');
  const cancelBtn = document.getElementById('gpsCancelBtn');

  overlay.style.display = 'flex';
  let collected = [];
  const max = 10;
  
  saveBtn.disabled = true; saveBtn.style.opacity = "0.5";
  progressText.innerText = "0 / 10"; progressBar.style.width = "0%";

  const collectInterval = setInterval(() => {
    if(collected.length >= max) return;
    navigator.geolocation.getCurrentPosition(pos => {
        collected.push({ lat: pos.coords.latitude, lon: pos.coords.longitude });
        statusMsg.innerText = "Veri alınıyor, sabit kalın...";
        progressText.innerText = `${collected.length} / ${max}`;
        progressBar.style.width = `${(collected.length / max) * 100}%`;
        if(collected.length >= max) { 
            saveBtn.disabled = false; saveBtn.style.opacity = "1"; 
            statusMsg.innerText = "Ölçüm bitti, onay bekliyor.";
        }
    }, err => { statusMsg.innerText = "Sinyal bekleniyor..."; }, { enableHighAccuracy: true, timeout: 5000 });
  }, 1500);

  saveBtn.onclick = async () => {
    const avg = calculateAvg(collected);
    clearInterval(collectInterval);
    overlay.style.display = 'none';
    let path = (qrData.block && qrData.block !== '') ? qrData.block + "qrcodes" : "qrCodes";
    const snap = await get(ref(db, path));
    const key = Object.keys(snap.val()).find(k => snap.val()[k].qrId === qrData.qrId);
    await update(ref(db, path + '/' + key), { lat: avg.lat, lon: avg.lon });
    alert("Koordinat mühürlendi!");
    loadQRCodes(blockDropdown.value || blockInput.value.trim() || '');
  };

  cancelBtn.onclick = () => { clearInterval(collectInterval); overlay.style.display = 'none'; };
}

loadQRCodes();
</script>
</body>
</html>
