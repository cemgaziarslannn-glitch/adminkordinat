<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Panel - CGA Hassas GPS & QR</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600&display=swap" rel="stylesheet">
<style>
body { margin:0; font-family:'Montserrat',sans-serif; background:#2c3e50; color:#ecf0f1; }
.container { max-width:800px; margin:80px auto 20px; padding:20px; background: rgba(0,0,0,0.3); border-radius:12px; }
h1 { text-align:center; margin-bottom:20px; }
label { display:block; margin-top:15px; font-weight:600; }
input, select, button { width:100%; padding:10px; margin:5px 0; border-radius:8px; border:none; font-size:16px; }
button { cursor:pointer; font-weight:600; transition:0.3s; }
button:hover { opacity:0.9; }
#qrList div { margin:10px 0; padding:10px; background: rgba(255,255,255,0.1); border-radius:8px; display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; position: relative; }
.qrCodeImg { width:150px; height:150px; border:1px solid #fff; border-radius:8px; display:flex; align-items:center; justify-content:center; background:#fff; padding:10px; }
#logoutBtn { position: fixed; top: 20px; left: 20px; width: 60px; height: 60px; background: #e74c3c; color: #fff; font-weight:700; border-radius:12px; border:none; cursor:pointer; z-index:1000; font-size:16px; }
#qrLabel { position: fixed; top: 20px; right: 20px; color: #ecf0f1; font-weight:600; font-size:14px; opacity:0.7; z-index:1000; }

.gps-info { font-size: 12px; color: #bdc3c7; margin-top: 5px; }
.gps-active { color: #2ecc71; font-weight: bold; }
.gps-inactive { color: #e74c3c; font-weight: bold; }

/* 🔹 ANALİZ OVERLAY CSS */
#gpsProgressOverlay { position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.95); color:white; z-index:9999; display:none; flex-direction:column; align-items:center; justify-content:center; text-align:center; }
.analysis-card { border:2px solid #3498db; padding:20px; border-radius:15px; background:#1a252f; width:95%; max-width:450px; max-height:90vh; overflow-y:auto; box-shadow: 0 0 25px rgba(52, 152, 219, 0.4); }
.gps-table { text-align:left; background:#000; padding:10px; border-radius:8px; font-family:monospace; font-size:10px; margin:15px 0; max-height:220px; overflow-y:auto; border:1px solid #333; }
.gps-header { color:#f1c40f; border-bottom:1px solid #333; padding-bottom:5px; margin-bottom:5px; display:flex; justify-content:space-between; font-weight:bold; font-size:11px; }
.gps-row { display:flex; justify-content:space-between; border-bottom:1px solid #111; padding:5px 0; align-items:center; }
#resultArea { margin-top:15px; padding:12px; background:rgba(46, 204, 113, 0.15); border:1px solid #2ecc71; border-radius:8px; display:none; }
</style>
</head>
<body>

<button id="logoutBtn">Çıkış</button>
<div id="qrLabel">qrcodes</div>

<div id="gpsProgressOverlay">
    <div class="analysis-card">
        <h2 style="color:#3498db; margin:0; font-size:18px; letter-spacing:1px;">CGA HASSAS GPS ANALİZİ</h2>
        <p id="gpsStatusMsg" style="font-size:12px; color:#bdc3c7; margin-top:5px;">Sinyal aranıyor, lütfen bekleyin...</p>
        
        <div id="gpsProgressText" style="font-size:45px; font-weight:bold; color:#2ecc71; margin:5px 0;">0 / 10</div>
        
        <div class="gps-table">
            <div class="gps-header">
                <span style="width:10%">#</span>
                <span style="width:65%">Koordinat (Lat, Lon)</span>
                <span style="width:25%; text-align:right;">Sapma</span>
            </div>
            <div id="gpsRows"></div>
        </div>

        <div id="resultArea">
            <b style="color:#2ecc71; font-size:14px;">HESAPLANAN ORTALAMA</b><br>
            <div id="finalAvgText" style="font-size:11px; font-family:monospace; margin-top:5px; background:rgba(0,0,0,0.3); padding:5px; border-radius:4px;"></div>
        </div>

        <div style="margin-top:20px; display:flex; flex-wrap:wrap; gap:10px; justify-content:center;">
            <button id="calcAvgBtn" disabled style="background:#f39c12; color:white; flex:1; min-width:130px; opacity:0.5;">ORTALAMA AL</button>
            <button id="gpsSaveBtn" disabled style="background:#27ae60; color:white; flex:1; min-width:130px; opacity:0.5;">KAYDET</button>
            <button id="gpsCancelBtn" style="background:#c0392b; color:white; flex:1; min-width:130px;">İPTAL</button>
        </div>
    </div>
</div>

<div class="container">
  <h1>Admin Panel - Devriye & GPS</h1>
  <label>Blok Seç (dropdown):</label>
  <select id="blockDropdown"><option value="">Seçiniz</option></select>
  <label>Veya Özel Blok Adı:</label>
  <input type="text" id="blockInput" placeholder="Örn: Melisa">
  <label>Nokta Adı:</label>
  <input type="text" id="pointName" placeholder="Örn: B Blok Giriş">
  <label style="display:flex; align-items:center; gap:10px; cursor:pointer;">
    <input type="checkbox" id="gpsRequiredCheckbox" style="width:auto;"> GPS Zorunlu Olsun
  </label>
  <button id="generateQRBtn" style="background:#27ae60; color:#fff; margin-top:20px;">QR Oluştur & Kaydet</button>
  
  <h2 style="margin-top:40px; border-bottom:1px solid rgba(255,255,255,0.1); padding-bottom:10px;">QR Noktaları</h2>
  <div id="qrList"></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.1.0/firebase-app.js";
import { getDatabase, ref, set, serverTimestamp, get, push, update } from "https://www.gstatic.com/firebasejs/12.1.0/firebase-database.js";

// --- ELEMENTLER ---
const blockDropdown = document.getElementById('blockDropdown');
const blockInput = document.getElementById('blockInput');
const pointName = document.getElementById('pointName');
const gpsRequiredCheckbox = document.getElementById('gpsRequiredCheckbox');
const generateQRBtn = document.getElementById('generateQRBtn');
const qrList = document.getElementById('qrList');
const logoutBtn = document.getElementById('logoutBtn');

logoutBtn.onclick = () => { window.location.href = 'mod.html'; };

// --- QR KÜTÜPHANESİ ---
const QR_SCRIPT = document.createElement('script');
QR_SCRIPT.src = "https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js";
document.body.appendChild(QR_SCRIPT);
await new Promise(res => QR_SCRIPT.onload = res);

// --- FIREBASE BAĞLANTISI ---
const merkezConfig = {
  apiKey: "AIzaSyAM5NHBpRHIlttNXwJ9YKDypR4eoyQbDeM",
  authDomain: "kolartguvenlik-e002d.firebaseapp.com",
  databaseURL: "https://kolartguvenlik-e002d-default-rtdb.firebaseio.com",
  projectId: "kolartguvenlik-e002d",
  storageBucket: "kolartguvenlik-e002d.firebasestorage.app",
  messagingSenderId: "212955174898",
  appId: "1:212955174898:web:f77501991c1648fb66bd6b"
};
const merkezApp = initializeApp(merkezConfig, "merkez");
const merkezDb = getDatabase(merkezApp);

const selectedSiteId = sessionStorage.getItem("selectedSite");
if(!selectedSiteId){
  alert("Site seçilmedi!");
  window.location.href = "index.html";
}

const siteConfigSnap = await get(ref(merkezDb, `sites/${selectedSiteId}/config`));
const db = getDatabase(initializeApp(siteConfigSnap.val(), selectedSiteId));

// --- MATEMATİK & MESAFE ---
function getDistance(lat1, lon1, lat2, lon2) {
    const R = 6371e3;
    const p1 = lat1 * Math.PI/180, p2 = lat2 * Math.PI/180;
    const dp = (lat2-lat1) * Math.PI/180, dl = (lon2-lon1) * Math.PI/180;
    const a = Math.sin(dp/2)**2 + Math.cos(p1)*Math.cos(p2)*Math.sin(dl/2)**2;
    const d = R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
    return d; 
}

function calculateAvg(list) {
    const sum = list.reduce((a, b) => ({ lat: a.lat + b.lat, lon: a.lon + b.lon }), { lat: 0, lon: 0 });
    return { lat: sum.lat / list.length, lon: sum.lon / list.length };
}

// --- QR İŞLEMLERİ ---
async function loadBlocks() {
  blockDropdown.innerHTML = '<option value="">Seçiniz</option>';
  const snapshot = await get(ref(db, 'qrNoktas/'));
  if(!snapshot.exists()) return;
  Object.values(snapshot.val()).forEach(qr => {
    if(qr.name && !Array.from(blockDropdown.options).some(o => o.value === qr.name)){
        const opt = document.createElement('option');
        opt.value = qr.name; opt.textContent = qr.name;
        blockDropdown.appendChild(opt);
    }
  });
}
loadBlocks();

generateQRBtn.onclick = async () => {
  const name = pointName.value.trim();
  let block = blockInput.value.trim() || blockDropdown.value.trim();
  if(!name) return alert("İsim şart!");
  generateQRBtn.disabled = true;
  const qrId = btoa(unescape(encodeURIComponent(name))) + '_' + Date.now();
  const path = block ? block + "qrcodes/" : "qrCodes/";
  await push(ref(db, path), { name, qrId, block: block || '', gpsRequired: gpsRequiredCheckbox.checked, timestamp: serverTimestamp() });
  pointName.value=''; blockInput.value='';
  loadQRCodes(block);
  generateQRBtn.disabled = false;
};

async function loadQRCodes(selectedBlock=''){
  qrList.innerHTML='Yükleniyor...';
  let path = selectedBlock ? selectedBlock + "qrcodes/" : "qrCodes/";
  const snapshot = await get(ref(db, path));
  qrList.innerHTML='';
  if(snapshot.exists()) Object.values(snapshot.val()).forEach(qr => addQRToList(qr));
}

function addQRToList(qrData){
  const div = document.createElement('div');
  const qrDiv = document.createElement('div'); qrDiv.className = 'qrCodeImg';
  new QRCode(qrDiv, { text: qrData.qrId, width:140, height:140 });

  const info = document.createElement('div'); info.style.flex = "1"; info.style.marginLeft = "15px";
  const gpsStatus = qrData.gpsRequired ? '<span class="gps-active">GPS AKTİF</span>' : '<span class="gps-inactive">PASİF</span>';
  const coords = qrData.lat ? `[${qrData.lat.toFixed(5)}, ${qrData.lon.toFixed(5)}]` : '(Kayıt Yok)';
  info.innerHTML = `<b>${qrData.name}</b><br><small>${qrData.qrId}</small><br><div class="gps-info">${gpsStatus} | ${coords}</div>`;

  const btnBox = document.createElement('div'); btnBox.style.display="flex"; btnBox.style.flexDirection="column"; btnBox.style.gap="5px";
  
  const cBtn = document.createElement('button'); cBtn.textContent="📍 Koordinat Ata"; cBtn.style.background="#3498db"; cBtn.style.fontSize="11px";
  cBtn.onclick = () => assignCoordinates(qrData);

  btnBox.append(cBtn);
  div.append(qrDiv, info, btnBox);
  qrList.appendChild(div);
}

// 🔹 ANALİZLİ HASSAS KOORDİNAT ATA
async function assignCoordinates(qrData) {
  const overlay = document.getElementById('gpsProgressOverlay');
  const statusMsg = document.getElementById('gpsStatusMsg');
  const gpsRows = document.getElementById('gpsRows');
  const progressText = document.getElementById('gpsProgressText');
  const calcAvgBtn = document.getElementById('calcAvgBtn');
  const saveBtn = document.getElementById('gpsSaveBtn');
  
  overlay.style.display = 'flex';
  gpsRows.innerHTML = '';
  document.getElementById('resultArea').style.display = 'none';
  let collected = [];
  const max = 10;

  const geoOpts = { enableHighAccuracy: true, timeout: 10000, maximumAge: 0 };

  const collectInterval = setInterval(() => {
    if(collected.length >= max) return;

    navigator.geolocation.getCurrentPosition(pos => {
        const lat = pos.coords.latitude;
        const lon = pos.coords.longitude;
        let diffText = "Referans";

        if(collected.length > 0) {
            const prev = collected[collected.length - 1];
            const d = getDistance(prev.lat, prev.lon, lat, lon);
            const color = d > 20 ? '#e74c3c' : (d > 5 ? '#f1c40f' : '#2ecc71');
            diffText = `<span style="color:${color}">${d.toFixed(2)}m</span>`;
        }

        collected.push({ lat, lon });
        
        const row = document.createElement('div');
        row.className = 'gps-row';
        row.innerHTML = `<span style="width:10%">#${collected.length}</span><span style="width:65%">${lat.toFixed(7)}, ${lon.toFixed(7)}</span><span style="width:25%; text-align:right;">${diffText}</span>`;
        gpsRows.appendChild(row);
        gpsRows.scrollTop = gpsRows.scrollHeight;
        progressText.innerText = `${collected.length} / ${max}`;

        if(collected.length >= max) {
            clearInterval(collectInterval);
            calcAvgBtn.disabled = false; calcAvgBtn.style.opacity = "1";
            statusMsg.innerText = "Veri toplama bitti. Analizi başlatın.";
        }
    }, err => { statusMsg.innerText = "GPS Sinyali Bekleniyor..."; }, geoOpts);
  }, 3000); // Test için 3 saniye yapıldı, gerçek kullanımda 60000 yapabilirsiniz

  calcAvgBtn.onclick = () => {
      const avg = calculateAvg(collected);
      document.getElementById('finalAvgText').innerText = `LAT: ${avg.lat.toFixed(8)} | LON: ${avg.lon.toFixed(8)}`;
      document.getElementById('resultArea').style.display = 'block';
      saveBtn.disabled = false; saveBtn.style.opacity = "1";
      calcAvgBtn.style.display = "none";
  };

  saveBtn.onclick = async () => {
      const avg = calculateAvg(collected);
      let path = qrData.block ? qrData.block + "qrcodes" : "qrCodes";
      const snap = await get(ref(db, path));
      const key = Object.keys(snap.val()).find(k => snap.val()[k].qrId === qrData.qrId);
      await update(ref(db, `${path}/${key}`), { lat: avg.lat, lon: avg.lon });
      alert("Nokta Mühürlendi!");
      overlay.style.display = 'none';
      loadQRCodes(blockDropdown.value);
  };

  document.getElementById('gpsCancelBtn').onclick = () => { clearInterval(collectInterval); overlay.style.display = 'none'; };
}

blockDropdown.onchange = () => loadQRCodes(blockDropdown.value);
loadQRCodes();
</script>
</body>
</html>
